<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="emptyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆圈 -->
  <circle cx="50" cy="50" r="40" fill="url(#emptyGradient)" opacity="0.5"/>
  
  <!-- 文件图标 -->
  <g fill="#9CA3AF">
    <rect x="35" y="35" width="30" height="40" rx="2"/>
    <path d="M35,35 L45,25 L55,25 L65,35 Z" fill="#6B7280"/>
  </g>
  
  <!-- 问号 -->
  <circle cx="50" cy="65" r="12" fill="white" stroke="#9CA3AF" stroke-width="2"/>
  <text x="50" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6B7280">?</text>
  
  <!-- 文字标签 -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280">Empty</text>
</svg>