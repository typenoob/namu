<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 贪吃蛇风格 -->
  <g>
    <!-- 网格背景 -->
    <g opacity="0.1" stroke="#999" stroke-width="0.5">
      <!-- 水平线 -->
      <line x1="0" y1="10" x2="100" y2="10"/>
      <line x1="0" y1="20" x2="100" y2="20"/>
      <line x1="0" y1="30" x2="100" y2="30"/>
      <line x1="0" y1="40" x2="100" y2="40"/>
      <line x1="0" y1="50" x2="100" y2="50"/>
      <line x1="0" y1="60" x2="100" y2="60"/>
      <line x1="0" y1="70" x2="100" y2="70"/>
      <line x1="0" y1="80" x2="100" y2="80"/>
      <line x1="0" y1="90" x2="100" y2="90"/>
      <!-- 垂直线 -->
      <line x1="10" y1="0" x2="10" y2="100"/>
      <line x1="20" y1="0" x2="20" y2="100"/>
      <line x1="30" y1="0" x2="30" y2="100"/>
      <line x1="40" y1="0" x2="40" y2="100"/>
      <line x1="50" y1="0" x2="50" y2="100"/>
      <line x1="60" y1="0" x2="60" y2="100"/>
      <line x1="70" y1="0" x2="70" y2="100"/>
      <line x1="80" y1="0" x2="80" y2="100"/>
      <line x1="90" y1="0" x2="90" y2="100"/>
    </g>
    
    <!-- 蛇身体（方块组成） -->
    <rect x="30" y="50" width="10" height="10" fill="#4CAF50"/>
    <rect x="40" y="50" width="10" height="10" fill="#4CAF50"/>
    <rect x="50" y="50" width="10" height="10" fill="#4CAF50"/>
    <rect x="50" y="40" width="10" height="10" fill="#4CAF50"/>
    <rect x="50" y="30" width="10" height="10" fill="#4CAF50"/>
    <rect x="60" y="30" width="10" height="10" fill="#2E7D32"/>
    
    <!-- 蛇头（绿色） -->
    <rect x="60" y="40" width="10" height="10" fill="#2E7D32"/>
    <!-- 眼睛 -->
    <rect x="65" y="42" width="3" height="3" fill="white"/>
    
    <!-- 食物（苹果） -->
    <circle cx="20" cy="20" r="5" fill="#F44336"/>
    <rect x="19" y="15" width="2" height="3" fill="#8BC34A"/>
  </g>
</svg>